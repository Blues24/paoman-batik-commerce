<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk - Admin</title>
    <link rel="stylesheet" href="../../css/navadmin.css">
    <link rel="stylesheet" href="../../css/produk.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Welcome Admin</h2>
            </div>
            <nav class="nav-menu">
                <a href="dasboardAdmin.html" class="nav-item" data-target="dashboard">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="produk.html" class="nav-item active" data-target="produk">
                    <i data-lucide="package"></i> Produk
                </a>
                <a href="listPesanan.html" class="nav-item" data-target="pesanan">
                    <i data-lucide="clipboard-list"></i> List Pesanan
                </a>
                <a href="kelolaStok.html" class="nav-item" data-target="laporan">
                    <i data-lucide="bar-chart-3"></i> Kelola Stok
                </a>
                <a href="kelolaAkun.html" class="nav-item" data-target="akun">
                    <i data-lucide="user-cog"></i> Kelola Akun
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item logout">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Produk</h1>
                <div class="header-right" style="display: flex; align-items: center; gap: 20px;">
                    <button class="btn-primary" id="btnTambahProduk">
                        <i data-lucide="plus"></i> Tambah Produk Baru
                    </button>
                    <div class="user-profile">
                        <div class="notif-icon"><i data-lucide="bell"></i></div>
                        <div class="profile-info">
                            <div class="text-profile">
                                <span class="name">Nama</span>
                                <span class="role">Admin</span>
                            </div>
                            <div class="avatar"><i data-lucide="user-circle"></i></div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="product-grid" id="productGrid">
                </div>
        </main>
    </div>

<div id="modalProduk" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Tambah Produk Baru</h3>
        <hr style="margin: 10px 0;">
        <form id="formProduk">
            <div class="form-group">
                <label>Nama Produk</label>
                <input type="text" id="namaProduk" placeholder="Contoh: Kain Batik Motif Iwak Etong" required>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" id="hargaProduk" placeholder="150000" required>
            </div>
            <div class="form-group">
                <label>Stok Awal</label>
                <input type="number" id="stokProduk" placeholder="10" required>
            </div>
            <div class="form-group">
                <label>URL Gambar</label>
                <input type="text" id="imgProduk" value="../../img/batik1.jpg" required>
            </div>
            <button type="submit" class="btn-save">Simpan Produk</button>
        </form>
    </div>
</div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/navigasiAdmin.js"></script>
    <script src="../../js/user-session.js"></script>
    <script src="../../js/produk.js?v=20260430-3"></script>
</body>
</html>
