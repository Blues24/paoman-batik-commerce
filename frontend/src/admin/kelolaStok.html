<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Stok - Admin</title>
    <link rel="stylesheet" href="../../css/kelolaStok.css">
    <link rel="stylesheet" href="../../css/navadmin.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Welcome Admin</h2>
            </div>
            <nav class="nav-menu">
                <a href="dasboardAdmin.html" class="nav-item" data-target="dashboard">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="produk.html" class="nav-item" data-target="produk">
                    <i data-lucide="package"></i> Produk
                </a>
                <a href="listPesanan.html" class="nav-item" data-target="pesanan">
                    <i data-lucide="clipboard-list"></i> List Pesanan
                </a>
                <a href="kelolaStok.html" class="nav-item active" data-target="laporan">
                    <i data-lucide="bar-chart-3"></i> Kelola Stok
                </a>
                <a href="kelolaAkun.html" class="nav-item" data-target="akun">
                    <i data-lucide="user-cog"></i> Kelola Akun
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item logout">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Kelola Stok</h1>
                <div class="user-profile">
                    <div class="notif-icon"><i data-lucide="bell"></i></div>
                    <div class="profile-info">
                        <div class="text-profile">
                            <span class="name">Nama</span>
                            <span class="role">Admin</span>
                        </div>
                        <div class="avatar"><i data-lucide="user-circle"></i></div>
                    </div>
                </div>
            </header>

            <div class="filter-section">
                <button class="filter-btn active">Semua</button>
                <button class="filter-btn">Stock Banyak <span class="count green">0</span></button>
                <button class="filter-btn">Stock Sedikit <span class="count yellow">0</span></button>
                <button class="filter-btn">Stock Habis <span class="count red">0</span></button>
            </div>

            <div class="card table-container">
                <table>
                    <thead>
                        <tr>
                            <th>FOTO PRODUK</th>
                            <th>NAMA PRODUK</th>
                            <th>KODE</th>
                            <th>STOK TERSEDIA</th>
                            <th>SATUAN</th>
                            <th>STATUS</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="stokTableBody">
                        </tbody>
                </table>

                <div class="pagination">
                    <p id="paginationInfo">Menampilkan 0 dari 0 Produk</p>
                    <div class="page-controls">
                        <button class="page-btn"><i data-lucide="chevron-left"></i></button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn"><i data-lucide="chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Stok Produk</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="formEditStok">
                <input type="hidden" id="editIndex">
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="editNama" disabled>
                </div>
                <div class="form-group">
                    <label>Jumlah Stok Baru</label>
                    <input type="number" id="editStokValue" min="0" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal">Batal</button>
                    <button type="submit" class="btn-primary">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/navigasiAdmin.js"></script>
    <script src="../../js/user-session.js"></script>
    <script src="../../js/stok.js?v=20260430-2"></script>
</body>
</html>
