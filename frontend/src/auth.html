<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - Batik Paoman</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="container">
        <header class="header-text">
            <h1>Selamat Datang</h1>
            <p>Masuk untuk menyimpan keranjang, konsultasi, dan kelola akunmu.</p>
        </header>

        <div class="auth-card">
            <div class="tab-header">
                <div class="tab active" data-tab="login" onclick="openTab(event, 'login')">Masuk</div>
                <div class="tab" data-tab="register" onclick="openTab(event, 'register')">Daftar</div>
                <div class="tab" data-tab="reset" onclick="openTab(event, 'reset')">Reset</div>
            </div>

            <div id="login" class="tab-content active">
                <form>
                    <div class="input-group">
                        <label>Username atau Email<span class="required">*</span></label>
                        <input type="text" id="login-input" placeholder="Username atau Email" required>
                    </div>

                    <div class="input-group">
                        <div class="label-flex">
                            <label>Password<span class="required">*</span></label>
                            <a href="#" class="forgot-link">Lupa Password?</a>
                        </div>

                        <div class="password-box">
                            <input type="password" id="login-pass" placeholder="Password" required>
                            <button type="button" class="eye-toggle" data-target="login-pass">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Masuk</button>
                </form>
            </div>

            <div id="register" class="tab-content">
                <form>
                    <div class="input-group">
                        <label>Nama Lengkap<span class="required">*</span></label>
                        <input type="text" id="register-nama" placeholder="Nama Lengkap" required>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label>Username<span class="required">*</span></label>
                            <input type="text" id="register-username" placeholder="Username" required>
                        </div>

                        <div class="input-group">
                            <label>No. HP<span class="required">*</span></label>
                            <input type="text" id="register-phone" placeholder="08xxxxxxxxxx" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email<span class="required">*</span></label>
                        <input type="email" id="register-email" placeholder="Email aktif" required>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label>Password<span class="required">*</span></label>
                            <div class="password-box">
                                <input type="password" id="register-pass" placeholder="Minimal 8 karakter" required>
                                <button type="button" class="eye-toggle" data-target="register-pass">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Konfirmasi Password<span class="required">*</span></label>
                            <div class="password-box">
                                <input type="password" id="register-pass-confirm" placeholder="Ulangi password" required>
                                <button type="button" class="eye-toggle" data-target="register-pass-confirm">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Buat Akun</button>
                </form>
            </div>

            <div id="reset" class="tab-content">
                <form>
                    <div class="input-group">
                        <label>Username atau Email<span class="required">*</span></label>
                        <input type="text" id="reset-input" placeholder="Masukkan username atau email" required>
                    </div>

                    <p class="helper-text">Mode ini masih simulasi frontend. Sistem akan menyimpan permintaan reset di browser untuk kebutuhan demo.</p>

                    <button type="submit" class="btn-submit">Kirim Reset Sandi</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/user-session.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
